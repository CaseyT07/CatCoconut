<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标生成器 — 交通标识助手</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    button { margin: 10px; padding: 12px 24px; font-size: 16px; cursor: pointer; }
    .hidden { display: none; }
    #status { color: #16a34a; font-weight: bold; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>点击按钮生成 PWA 图标</h2>
  <p>生成的图片会自动下载到你的"下载"文件夹，然后把它们放到 <code>icons/</code> 目录即可。</p>

  <div>
    <canvas id="c192" width="192" height="192"></canvas>
    <p>icon-192.png</p>
    <button onclick="generateIcon(192, 'icon-192.png')">下载 icon-192.png</button>
  </div>
  <div>
    <canvas id="c512" width="512" height="512"></canvas>
    <p>icon-512.png</p>
    <button onclick="generateIcon(512, 'icon-512.png')">下载 icon-512.png</button>
  </div>
  <button onclick="generateBoth()" style="background:#2563eb;color:white;border:none;border-radius:8px;">
    一键下载两个图标
  </button>
  <div id="status" class="hidden"></div>

  <script>
    function drawIcon(size) {
      var canvas = document.getElementById("c" + size);
      var ctx = canvas.getContext("2d");
      var w = size, h = size;

      // Blue background with rounded corners
      var r = size * 0.2;
      ctx.fillStyle = "#2563eb";
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(w - r, 0);
      ctx.quadraticCurveTo(w, 0, w, r);
      ctx.lineTo(w, h - r);
      ctx.quadraticCurveTo(w, h, w - r, h);
      ctx.lineTo(r, h);
      ctx.quadraticCurveTo(0, h, 0, h - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.fill();

      // White triangle (warning sign shape)
      var triW = size * 0.7;
      var triH = size * 0.58;
      var cx = w / 2;
      var topY = size * 0.13;
      ctx.strokeStyle = "white";
      ctx.lineWidth = size * 0.055;
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(cx, topY);
      ctx.lineTo(cx + triW / 2, topY + triH);
      ctx.lineTo(cx - triW / 2, topY + triH);
      ctx.closePath();
      ctx.stroke();

      // White exclamation mark
      ctx.fillStyle = "white";
      ctx.font = "bold " + (size * 0.4) + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("!", cx, topY + triH * 0.57);
    }

    function generateIcon(size, filename) {
      drawIcon(size);
      var canvas = document.getElementById("c" + size);
      canvas.toBlob(function (blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        var status = document.getElementById("status");
        status.textContent = "已下载: " + filename;
        status.classList.remove("hidden");
      }, "image/png");
    }

    function generateBoth() {
      generateIcon(192, "icon-192.png");
      setTimeout(function () {
        generateIcon(512, "icon-512.png");
      }, 500);
    }

    // Pre-draw both
    drawIcon(192);
    drawIcon(512);
  </script>
</body>
</html>
