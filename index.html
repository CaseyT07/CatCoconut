<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="交通标识助手">
  <meta name="description" content="交通标识学习助手 — 学习交规标志，刷题巩固记忆">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="stylesheet" href="css/style.css">
  <title>交通标识助手</title>
</head>
<body>

  <!-- Skip to content for keyboard users -->
  <a href="#page-learn" class="skip-link">跳到主要内容</a>

  <!-- Header -->
  <header class="app-header" role="banner">
    <span class="header-icon" aria-hidden="true">🚗</span>
    <h1>交通标识助手</h1>
  </header>

  <!-- === Learn Page === -->
  <div class="page active" id="page-learn" role="main" aria-label="学习交通标志">
    <div class="search-bar">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <label for="searchInput" class="sr-only">搜索交通标志</label>
      <input type="text" id="searchInput" placeholder="搜索交通标志..." aria-label="搜索交通标志">
      <button class="search-clear-btn" id="searchClearBtn" aria-label="清除搜索" style="display:none;">✕</button>
    </div>

    <div class="category-tabs" id="categoryTabs"></div>

    <div class="sign-grid" id="signGrid"></div>
  </div>

  <!-- === Quiz Page === -->
  <div class="page" id="page-quiz" role="main" aria-label="刷题">
    <div id="quizContainer">
      <!-- Dynamically filled by quiz.js -->
    </div>
  </div>

  <!-- === Wrong Answer Page === -->
  <div class="page" id="page-wrong" role="main" aria-label="错题管理">
    <div id="wrongContainer">
      <!-- Dynamically filled by quiz.js -->
    </div>
  </div>

  <!-- === Driving Tips Page === -->
  <div class="page" id="page-tips" role="main" aria-label="驾驶知识">
    <div class="tips-list" id="tipsList"></div>
  </div>

  <!-- === Detail Modal === -->
  <div class="modal-overlay" id="detailModal" style="display:none;" role="dialog" aria-modal="true" aria-label="标志详情">
    <div class="modal-content" id="modalContent" role="document"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar" role="navigation" aria-label="主导航">
    <button class="tab-item active" data-tab="learn" aria-label="学习" aria-current="page">
      <span class="tab-icon" aria-hidden="true">📖</span>
      <span class="tab-label">学习</span>
    </button>
    <button class="tab-item" data-tab="quiz" aria-label="刷题">
      <span class="tab-icon" aria-hidden="true">✏️</span>
      <span class="tab-label">刷题</span>
    </button>
    <button class="tab-item" data-tab="wrong" aria-label="错题">
      <span class="tab-icon" aria-hidden="true">📋</span>
      <span class="tab-label">错题</span>
    </button>
    <button class="tab-item" data-tab="tips" aria-label="知识">
      <span class="tab-icon" aria-hidden="true">💡</span>
      <span class="tab-label">知识</span>
    </button>
  </nav>

  <!-- Toast notification container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/data.js"></script>
  <script src="js/knowledge.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
