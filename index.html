<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="交通标识助手">
  <meta name="description" content="交通标识学习助手 — 学习交规标志，刷题巩固记忆">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="stylesheet" href="css/style.css">
  <title>交通标识助手</title>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <span class="header-icon">🚗</span>
    <h1>交通标识助手</h1>
  </header>

  <!-- === Learn Page === -->
  <div class="page active" id="page-learn">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索交通标志...">
    </div>

    <div class="category-tabs" id="categoryTabs"></div>

    <div class="sign-grid" id="signGrid"></div>
  </div>

  <!-- === Quiz Page === -->
  <div class="page" id="page-quiz">
    <div id="quizContainer">
      <!-- Dynamically filled by quiz.js -->
    </div>
  </div>

  <!-- === Wrong Answer Page === -->
  <div class="page" id="page-wrong">
    <div id="wrongContainer">
      <!-- Dynamically filled by quiz.js -->
    </div>
  </div>

  <!-- === Driving Tips Page === -->
  <div class="page" id="page-tips">
    <div class="tips-list" id="tipsList"></div>
  </div>

  <!-- === Detail Modal === -->
  <div class="modal-overlay" id="detailModal" style="display:none;">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-item active" data-tab="learn">
      <span class="tab-icon">📖</span>
      <span class="tab-label">学习</span>
    </button>
    <button class="tab-item" data-tab="quiz">
      <span class="tab-icon">✏️</span>
      <span class="tab-label">刷题</span>
    </button>
    <button class="tab-item" data-tab="wrong">
      <span class="tab-icon">📋</span>
      <span class="tab-label">错题</span>
    </button>
    <button class="tab-item" data-tab="tips">
      <span class="tab-icon">💡</span>
      <span class="tab-label">知识</span>
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/knowledge.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
